<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FCA Match">
<title>FCA Match Controller</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:#04080F; color:#fff; font-family:'Inter', -apple-system, sans-serif; min-height:100vh; overscroll-behavior: none; }

  /* TOP BAR */
  .appbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(4,8,15,0.85); backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 16px; display:flex; justify-content:space-between; align-items:center;
  }
  .appbar-title { font-family:'Oswald', sans-serif; font-weight:700; font-size:18px; letter-spacing:0.06em; text-transform:uppercase; }
  .appbar-sub { font-family:'Inter'; font-weight:500; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.45); }
  .appbar-match { text-align:right; }
  .appbar-match strong { display:block; font-family:'Oswald'; font-weight:700; font-size:13px; letter-spacing:0.06em; }
  .appbar-match small { display:block; font-family:'Inter'; font-weight:500; font-size:10px; color:#F5B82E; letter-spacing:0.14em; text-transform:uppercase; margin-top:2px; }

  /* MAIN */
  .container { padding: 16px; padding-bottom: 80px; max-width: 520px; margin: 0 auto; }

  /* PREVIEW */
  .preview-wrap { position:relative; margin: 0 auto 20px; background:#000; border-radius: 18px; overflow:hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06); }
  .preview-ratio { position:relative; width:100%; padding-top: 177.78%; /* 9:16 = 1920/1080 */ }
  .preview-inner { position:absolute; inset:0; }
  .preview-scaled { position:absolute; top:0; left:0; transform-origin: top left; }

  /* SECTION */
  .section { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; }
  .section-label { font-family:'Inter'; font-weight:600; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center; }
  .section-label .badge { background: rgba(245,184,46,0.18); color:#F5B82E; padding: 3px 10px; border-radius: 999px; font-size: 9px; letter-spacing: 0.14em; }

  /* VARIANT TABS (scroll horizontal) */
  .variants-scroll { display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 2px 0; margin: 0 -16px; padding-left:16px; padding-right:16px; }
  .variants-scroll::-webkit-scrollbar { display: none; }
  .variant-chip { flex-shrink: 0; background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.75); border:1px solid rgba(255,255,255,0.12); padding:9px 16px; border-radius:999px; font-family:'Inter'; font-weight:600; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; transition: all .15s; }
  .variant-chip.on { background:#2E7BFF; color:#04080F; border-color:transparent; }
  .variant-chip.on.gold { background:#F5B82E; color:#04080F; }
  .variant-chip.on.green { background:#22C55E; }
  .variant-chip.on.red { background:#EF4444; color:#fff; }
  .variant-chip.on.orange { background:#F59E0B; color:#04080F; }

  /* INPUT */
  .row { display:flex; gap:10px; margin-top:10px; align-items:center; }
  .row:first-of-type { margin-top: 0; }
  .row label { flex-shrink:0; min-width: 90px; font-family:'Inter'; font-weight:500; font-size:13px; color:rgba(255,255,255,0.6); }
  .row input, .row select {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,0.06); color:#fff; border:1px solid rgba(255,255,255,0.12);
    padding:10px 12px; border-radius: 10px; font-family:'Inter'; font-weight:500; font-size: 15px;
    -webkit-appearance: none; appearance: none;
  }
  .row input:focus, .row select:focus { outline: none; border-color: #2E7BFF; background: rgba(46,123,255,0.1); }
  .row input[type="number"] { font-family:'JetBrains Mono', monospace; text-align:center; }

  .score-row { display:flex; gap:10px; align-items:center; justify-content:center; margin-top: 10px; }
  .score-row input { width: 72px; font-size: 22px; font-family:'Oswald'; font-weight:700; text-align:center; padding: 10px 4px; }
  .score-dash { font-family:'Oswald'; font-weight:700; font-size:22px; color:rgba(255,255,255,0.4); }

  /* HOME/AWAY TOGGLE */
  .toggle-pair { display:flex; gap:8px; }
  .toggle-pair button {
    flex: 1; background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.7);
    border:1px solid rgba(255,255,255,0.12); padding:10px 14px; border-radius:10px;
    font-family:'Inter'; font-weight:600; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;
  }
  .toggle-pair button.on.home { background:#22C55E; color:#04080F; border-color:transparent; }
  .toggle-pair button.on.away { background:#F59E0B; color:#04080F; border-color:transparent; }

  /* ACTIONS */
  .action-stack { position: sticky; bottom: 0; left:0; right:0; background: linear-gradient(180deg, transparent, #04080F 30%); padding: 20px 16px 20px; margin: 20px -16px 0; z-index:40; }
  .action-btn {
    width:100%; padding: 16px; border-radius: 14px; border: 0;
    font-family:'Oswald'; font-weight:700; font-size: 16px; letter-spacing: 0.1em; text-transform:uppercase;
    cursor:pointer; display:flex; justify-content:center; align-items:center; gap: 10px;
    transition: all .15s;
  }
  .action-btn.primary { background: linear-gradient(135deg, #2E7BFF, #1A6FFF); color: #fff; box-shadow: 0 8px 24px rgba(46,123,255,0.35); }
  .action-btn.primary:active { transform: scale(0.98); }
  .action-btn.secondary { background: rgba(245,184,46,0.15); color:#F5B82E; border: 1px solid rgba(245,184,46,0.5); margin-top:10px; font-size: 14px; padding: 14px; }
  .action-btn.tertiary { background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.14); margin-top: 10px; font-size: 13px; padding: 12px; }

  /* CAPTION PREVIEW */
  .caption-preview { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.8); white-space: pre-wrap; word-wrap: break-word; max-height: 240px; overflow-y: auto; }

  /* TOAST */
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); opacity:0; background: #22C55E; color: #04080F; padding: 12px 22px; border-radius: 999px; font-family:'Inter'; font-weight:700; font-size: 13px; letter-spacing: 0.14em; text-transform:uppercase; transition: all .3s; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* PLAYER GRID */
  .player-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
  .player-mini { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 6px; text-align: center; cursor: pointer; transition: all .15s; position: relative; }
  .player-mini.on { background: rgba(46,123,255,0.18); border-color: #2E7BFF; }
  .player-mini img { width: 100%; aspect-ratio: 1; object-fit: cover; object-position: top; border-radius: 8px; background: #0F2240; }
  .player-mini .pname { font-family:'Oswald'; font-weight:600; font-size: 11px; text-transform:uppercase; margin-top: 4px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.02em; }
  .player-mini .pjer { position: absolute; top: 4px; right: 4px; background: #2E7BFF; color: #04080F; font-family:'Oswald'; font-weight:700; font-size: 10px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 12px rgba(46,123,255,0.5); }

  .loading { color: rgba(255,255,255,0.4); font-size: 11px; padding: 8px; text-align: center; font-style: italic; }

  /* Animations for bottom buttons */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }

  /* Install PWA tip */
  .tip { background: rgba(46,123,255,0.08); border: 1px solid rgba(46,123,255,0.2); border-radius: 12px; padding: 10px 14px; font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 12px; line-height: 1.5; }
  .tip strong { color: #2E7BFF; }
</style>
</head>
<body>
  <div class="appbar">
    <div>
      <div class="appbar-sub">Match Controller</div>
      <div class="appbar-title">FC Atlantic</div>
    </div>
    <div class="appbar-match">
      <strong id="match-opponent">vs FC Kurde Lausanne</strong>
      <small id="match-date">Dim 26 avril · 15:00</small>
    </div>
  </div>

  <div class="container">
    <div class="tip" id="install-tip">
      <strong>📲 Tip iPhone :</strong> Safari → Partage → « Sur l'écran d'accueil » pour installer l'app en 1 tap.
    </div>

    <!-- PREVIEW -->
    <div class="preview-wrap">
      <div class="preview-ratio">
        <div class="preview-inner">
          <div class="preview-scaled" id="poster-root"></div>
        </div>
      </div>
    </div>

    <!-- VARIANTS -->
    <div class="section">
      <div class="section-label">Variant <span class="badge" id="variant-badge">matchday</span></div>
      <div class="variants-scroll" id="variants-scroll"></div>
    </div>

    <!-- LIVE DATA -->
    <div class="section" id="live-section">
      <div class="section-label">Données live</div>
      <div class="score-row">
        <input type="number" id="score-home" min="0" max="20" value="0" inputmode="numeric">
        <span class="score-dash">—</span>
        <input type="number" id="score-away" min="0" max="20" value="0" inputmode="numeric">
      </div>
      <div class="row">
        <label>Minute</label>
        <input type="number" id="minute-input" min="0" max="120" value="73" inputmode="numeric">
      </div>
    </div>

    <!-- LOCATION -->
    <div class="section">
      <div class="section-label">Lieu du match</div>
      <div class="toggle-pair">
        <button id="btn-home" class="on home" onclick="setHomeAway('home')">🏠 Domicile</button>
        <button id="btn-away" onclick="setHomeAway('away')">✈️ Extérieur</button>
      </div>
    </div>

    <!-- GOAL SECTION (hidden unless goal variant) -->
    <div class="section" id="goal-section" style="display:none;">
      <div class="section-label">Buteur</div>
      <div class="player-grid" id="scorer-grid"></div>
    </div>

    <!-- MAN OF THE MATCH SECTION -->
    <div class="section" id="hdm-section" style="display:none;">
      <div class="section-label">Homme du match</div>
      <div class="player-grid" id="hdm-grid"></div>
    </div>

    <!-- CAPTION -->
    <div class="section">
      <div class="section-label">
        Caption sociale
        <span class="badge" style="background:rgba(34,197,94,0.18); color:#22C55E;">auto</span>
      </div>
      <div class="caption-preview" id="caption-preview"></div>
    </div>

    <!-- ACTIONS -->
    <div class="action-stack">
      <button class="action-btn primary" onclick="downloadPoster()">
        📥 Télécharger le PNG
      </button>
      <button class="action-btn secondary" onclick="copyCaption()">
        📋 Copier la caption
      </button>
      <button class="action-btn tertiary" onclick="sharePoster()" id="share-btn" style="display:none;">
        📱 Partager (Share Sheet iOS)
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- SCRIPTS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
  /* ====================================================================
     FCA MATCH CONTROLLER
     Mobile-optimized live poster generator for match day.
     Produces 1080×1920 PNGs of the 7 matchday variants.
     ==================================================================== */

  /* ------ ROSTER (source of truth) ------------------------------------ */
  const ROSTER = [
    { id:'30-T', jerseyDisplay:30, firstName:'Tony', lastName:'Da Costa', position:'G', photoUrl:'https://fc-atlantic-vevey.ch/players/da-costa-tony.png' },
    { id:'21', jerseyDisplay:21, firstName:'Dardan', lastName:'Fazlijaj', position:'DEF', photoUrl:'https://fc-atlantic-vevey.ch/players/fazlijaj-dardan.png' },
    { id:'3',  jerseyDisplay:3,  firstName:'Luka', lastName:'Jankulovski', position:'DEF', photoUrl:'https://fc-atlantic-vevey.ch/players/jankulovski-luka.png' },
    { id:'20', jerseyDisplay:20, firstName:'Jeyson', lastName:'Dias Coelho', position:'DEF', photoUrl:'https://fc-atlantic-vevey.ch/players/dias-coelho-jeyson.png' },
    { id:'2',  jerseyDisplay:2,  firstName:'Carlos Pedro', lastName:'Fofo das Neves', position:'DEF', photoUrl:'https://fc-atlantic-vevey.ch/players/fofo-das-neves-carlos-pedro.png' },
    { id:'18', jerseyDisplay:18, firstName:'Pedro Miguel', lastName:'Pinheiro Da Silva', position:'MIL', isCaptain:true, photoUrl:'https://fc-atlantic-vevey.ch/players/pinheiro-da-silva-pedro-miguel.png' },
    { id:'22', jerseyDisplay:22, firstName:'Haci Ismayl', lastName:'Ucar', position:'MIL', photoUrl:'https://fc-atlantic-vevey.ch/players/ucar-haci-ismayl.png' },
    { id:'12', jerseyDisplay:12, firstName:'Diego', lastName:'Aira Abalo', position:'MIL', photoUrl:'https://fc-atlantic-vevey.ch/players/aira-abalo-diego.png' },
    { id:'10', jerseyDisplay:10, firstName:'David', lastName:'Pinheiro da Silva', position:'AT', photoUrl:'https://fc-atlantic-vevey.ch/players/pinheiro-da-silva-david.png' },
    { id:'11', jerseyDisplay:11, firstName:'Alexander', lastName:'Blagojevic', position:'AT', photoUrl:'https://fc-atlantic-vevey.ch/players/blagojevic-alexander.png' },
    { id:'19', jerseyDisplay:19, firstName:'Rafael', lastName:'Esteves Teixeira', position:'AT', photoUrl:'https://fc-atlantic-vevey.ch/players/esteves-teixeira-rafael.png' },
    { id:'1',  jerseyDisplay:1,  firstName:'Tiago', lastName:'Vilas-Boas', position:'G', photoUrl:'https://fc-atlantic-vevey.ch/players/vilas-boas-tiago.png' },
    { id:'6',  jerseyDisplay:6,  firstName:'Joel', lastName:'Artimo', position:'DEF', photoUrl:'https://fc-atlantic-vevey.ch/players/artimo-joel.png' },
    { id:'23', jerseyDisplay:23, firstName:'Flamur', lastName:'Salihu', position:'MIL', photoUrl:'https://fc-atlantic-vevey.ch/players/salihu-flamur.png' },
    { id:'28', jerseyDisplay:28, firstName:'Jose Luis', lastName:'Cardoso Silva', position:'MIL', photoUrl:'https://fc-atlantic-vevey.ch/players/cardoso-silva-jose-luis.png' },
    { id:'14', jerseyDisplay:14, firstName:'Ismael', lastName:'Sayedna', position:'AT', photoUrl:'https://fc-atlantic-vevey.ch/players/sayedna-ismael.png' },
    { id:'30-M', jerseyDisplay:30, firstName:'Max', lastName:'Artimo', position:'G', photoUrl:'https://fc-atlantic-vevey.ch/players/artimo-max.png' },
  ];
  const BY_ID = Object.fromEntries(ROSTER.map(p => [p.id, p]));

  /* ------ CONFIG MATCH (éditable) ------------------------------------ */
  const MATCH = {
    opponent: { name: 'FC KURDE LAUSANNE', shortName: 'KURDE', crestUrl: 'https://fc-atlantic-vevey.ch/logos/clubs/fc-kurde-ls.png' },
    kickoff:  { dayName:'DIMANCHE', dateLabel:'26 AVRIL', year:2026, time:'15:00' },
    venue:    { name:'STADE DE LA VEYRE', city:'ST-LÉGIER' },
    competition: { line1: 'CHAMPIONNAT', line2: '5E LIGUE · GROUPE 2' },
  };

  /* ------ STATE ------------------------------------------------------- */
  const state = {
    variant: 'matchday',
    homeAway: 'home',
    score: { home: 0, away: 0 },
    minute: 73,
    scorerId: '11',
    hdmId: '11',
    lastEvent: null,
  };

  /* ------ VARIANTS META ----------------------------------------------- */
  const VARIANTS = [
    { id: 'preview-j3',       label: 'Preview J-3',   theme: '' },
    { id: 'matchday',         label: 'Matchday',      theme: '' },
    { id: 'lineup',           label: 'Lineup',        theme: '' },
    { id: 'live-score',       label: 'Live Score',    theme: 'red' },
    { id: 'goal',             label: 'But ⚽',        theme: '' },
    { id: 'halftime',         label: 'Mi-temps',      theme: 'orange' },
    { id: 'recap',            label: 'Recap Final',   theme: 'green' },
    { id: 'man-of-the-match', label: 'HDM 🏆',        theme: 'gold' },
  ];

  /* ------ CHANT HELPER ------------------------------------------------ */
  function chantForMatch(homeAway) {
    const homeChants = ["Allez les Blancs ! 🤍","Allez FC Atlantic ! 💪","Tous derrière les Blancs ! 🏟️","Soutien total à nos Blancs ! 💙"];
    const awayChants = ["Allez les Bleus ! 💙","On suit l'Atlantic en déplacement ! ✈️","Soutien aux Bleus à l'extérieur ! 💪","Les Bleus en route pour la victoire ! 🔥"];
    const pool = homeAway === 'home' ? homeChants : awayChants;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  /* ------ CAPTION BUILDER -------------------------------------------- */
  function buildCaption() {
    const tags = '#FCAtlanticVevey #AtlanticNoir #5eLigue #FootballSuisse #MatchDay #Vevey #StLegier';
    const dateLine = `${MATCH.kickoff.dayName} ${MATCH.kickoff.dateLabel} ${MATCH.kickoff.year} — ${MATCH.kickoff.time}`;
    const chant = chantForMatch(state.homeAway);
    const v = state.variant;

    if (v === 'preview-j3') return `⚽ J-3 — RENDEZ-VOUS MATCHDAY\n\n📅 ${dateLine}\n🏟️ ${MATCH.venue.name}, ${MATCH.venue.city}\n🆚 ${MATCH.opponent.name}\n🏆 ${MATCH.competition.line2}\n\nOn prépare le terrain. ${chant}\n\n—\n${tags}`;

    if (v === 'matchday') return `⚽ C'EST MATCHDAY\n\n📅 ${dateLine}\n🏟️ ${MATCH.venue.name}, ${MATCH.venue.city}\n🆚 ${MATCH.opponent.name}\n🏆 ${MATCH.competition.line2}\n\nCoup d'envoi dans quelques heures. On joue ensemble. ${chant}\n\n—\n${tags}`;

    if (v === 'lineup') return `📋 LES ONZE DE DÉPART\n\nLa composition est prête. On y va ensemble.\n\n⏰ Coup d'envoi ${MATCH.kickoff.time}\n🏟️ ${MATCH.venue.name}\n\n${chant}\n\n—\n${tags}`;

    if (v === 'live-score') {
      const stateMsg = state.score.home > state.score.away ? 'On mène 💪' : (state.score.home < state.score.away ? 'On est mené, mais on lâche rien.' : 'Tout reste à jouer.');
      return `⚽ ${state.score.home} — ${state.score.away} À LA ${state.minute}'\n\n${stateMsg}\n\n${chant}\n\n—\n${tags}`;
    }

    if (v === 'goal') {
      const s = BY_ID[state.scorerId];
      return `⚽⚽⚽ BUUUUUT ${s.firstName} ${s.lastName.toUpperCase()} (${state.minute}') !\n\nScore : ${state.score.home} — ${state.score.away}\n\n${chant}\n\n—\n${tags} #BUT`;
    }

    if (v === 'halftime') return `⏸️ MI-TEMPS — ${state.score.home} / ${state.score.away}\n\n45 minutes encore à jouer. On reste concentré.\n${chant}\n\n—\n${tags}`;

    if (v === 'recap') {
      const result = state.score.home > state.score.away ? '🏆 VICTOIRE !' : (state.score.home < state.score.away ? 'Défaite courageuse.' : '🤝 Match nul.');
      return `🏁 COUP DE SIFFLET FINAL\n\n${state.homeAway === 'home' ? 'FC ATLANTIC' : MATCH.opponent.shortName} ${state.score.home} — ${state.score.away} ${state.homeAway === 'home' ? MATCH.opponent.shortName : 'FC ATLANTIC'}\n\n${result}\n🏟️ ${MATCH.venue.name}, ${MATCH.venue.city}\n🏆 ${MATCH.competition.line2}\n\nMerci à tous les supporters. ${chant}\n\n—\n${tags} #Resultat`;
    }

    if (v === 'man-of-the-match') {
      const h = BY_ID[state.hdmId];
      return `🏆 HOMME DU MATCH\n\n${h.firstName} ${h.lastName.toUpperCase()} · #${h.jerseyDisplay}\n\nÉlu par le staff après notre match\nFC ATLANTIC ${state.score.home} — ${state.score.away} ${MATCH.opponent.shortName}\n🏆 ${MATCH.competition.line2}\n\nFélicitations à notre joueur de la semaine ! 👏\n${chant}\n\n—\n${tags} #HDM`;
    }

    return '';
  }

  /* ------ POSTER RENDERING -------------------------------------------- */
  const CREST_ATL = 'https://fc-atlantic-vevey.ch/images/logo-white.svg';
  const ACCENT = '#2E7BFF';
  const GOLD = '#F5B82E';

  function posterHTML() {
    const v = state.variant;
    const theme = {
      'preview-j3': { eyebrow: 'PREVIEW · J-3', accent: '#8DB6FF' },
      'matchday':   { eyebrow: 'MATCHDAY',      accent: ACCENT },
      'lineup':     { eyebrow: 'COMPOSITION',   accent: ACCENT },
      'live-score': { eyebrow: 'EN DIRECT',     accent: '#EF4444' },
      'goal':       { eyebrow: 'BUT',           accent: ACCENT },
      'halftime':   { eyebrow: 'MI-TEMPS',      accent: '#F59E0B' },
      'recap':      { eyebrow: 'RÉSULTAT FINAL',accent: '#22C55E' },
      'man-of-the-match': { eyebrow: 'HOMME DU MATCH', accent: GOLD },
    }[v] || { eyebrow: 'MATCHDAY', accent: ACCENT };

    const isBleed = v === 'goal' || v === 'man-of-the-match';
    const bg = isBleed ? '#04080F' : 'radial-gradient(ellipse 90% 70% at 50% 15%, #0F2240 0%, #04080F 75%), #04080F';
    const homeAwayLabel = state.homeAway === 'home' ? 'DOMICILE' : 'EXTÉRIEUR';

    let inner = '';
    if (v === 'preview-j3' || v === 'matchday') inner = classicPoster(theme, homeAwayLabel);
    else if (v === 'lineup')     inner = lineupPoster(theme);
    else if (v === 'live-score') inner = liveScorePoster(theme);

  const SCALE_MOBILE = 0.35; // 1080 * 0.35 = 378px, fits mobile column

  function updatePreview() {
    const container = document.getElementById('poster-root');
    const wrapW = container.parentElement.clientWidth;
    const scale = wrapW / 1080;
    container.innerHTML = posterHTML();
    container.style.transform = `scale(${scale})`;
    container.style.width = '1080px';
    container.style.height = '1920px';
  }

  function updateCaption() {
    document.getElementById('caption-preview').textContent = buildCaption();
  }

    document.getElementById('variant-badge').textContent = state.variant;
    updatePreview();
    updateCaption();
    updateSectionsVisibility();

  function updateSectionsVisibility() {
    const v = state.variant;
    const liveSection = document.getElementById('live-section');
    const goalSection = document.getElementById('goal-section');
    const hdmSection = document.getElementById('hdm-section');
    const liveNeeded = ['live-score','goal','halftime','recap','man-of-the-match'].includes(v);
    liveSection.style.display = liveNeeded ? '' : 'none';
    goalSection.style.display = v === 'goal' ? '' : 'none';
    hdmSection.style.display = v === 'man-of-the-match' ? '' : 'none';
  }

  function renderVariantChips() {
    const wrap = document.getElementById('variants-scroll');
    wrap.innerHTML = VARIANTS.map(v => `<button class="variant-chip ${state.variant === v.id ? 'on ' + (v.theme || '') : ''}" data-v="${v.id}">${v.label}</button>`).join('');
    wrap.querySelectorAll('.variant-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        state.variant = btn.dataset.v;
        renderVariantChips();
        refresh();
      });
    });
  }

  function renderPlayerGrid(containerId, selectedId, onPick) {
    const c = document.getElementById(containerId);
    c.innerHTML = ROSTER.map(p => `
      <div class="player-mini ${p.id === selectedId ? 'on' : ''}" data-id="${p.id}">
        <div class="pjer">${p.jerseyDisplay}</div>
        <img src="${p.photoUrl}" alt="" loading="lazy" onerror="this.style.background='#0F2240'">
        <div class="pname">${p.lastName}</div>
      </div>
    `).join('');
    c.querySelectorAll('.player-mini').forEach(el => {
      el.addEventListener('click', () => {
        onPick(el.dataset.id);
      });
    });
  }

  function setHomeAway(ha) {
    state.homeAway = ha;
    document.getElementById('btn-home').classList.toggle('on', ha === 'home');
    document.getElementById('btn-away').classList.toggle('on', ha === 'away');
    document.getElementById('btn-home').classList.toggle('home', ha === 'home');
    document.getElementById('btn-away').classList.toggle('away', ha === 'away');
    refresh();
  }

  /* ------ EVENT BINDINGS --------------------------------------------- */
  document.getElementById('score-home').addEventListener('input', e => {
    state.score.home = parseInt(e.target.value) || 0;
    refresh();
  });
  document.getElementById('score-away').addEventListener('input', e => {
    state.score.away = parseInt(e.target.value) || 0;
    refresh();
  });
  document.getElementById('minute-input').addEventListener('input', e => {
    state.minute = parseInt(e.target.value) || 0;
    refresh();
  });

  /* ------ TOAST ------------------------------------------------------- */
  function toast(msg, duration = 2000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  /* ------ ACTIONS ----------------------------------------------------- */
  async function renderFullResPoster() {
    const off = document.createElement('div');
    off.style.cssText = 'position:fixed; left:-99999px; top:0; width:1080px; height:1920px;';
    off.innerHTML = posterHTML();
    document.body.appendChild(off);
    
    const images = off.querySelectorAll('img');
    await Promise.all([...images].map(img => {
      if (img.complete) return Promise.resolve();
      return new Promise(res => {
        img.onload = res;
        img.onerror = res;
        setTimeout(res, 3000);
      });
    }));
    
    const canvas = await html2canvas(off.querySelector('#poster-node'), {
      width: 1080, height: 1920, scale: 1, backgroundColor: null,
      useCORS: true, allowTaint: false, logging: false,
    });
    document.body.removeChild(off);
    return canvas;
  }

  async function downloadPoster() {
    toast('Génération en cours...', 5000);
    try {
      const canvas = await renderFullResPoster();
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png', 0.95));
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `FCA_${state.variant}_${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('✅ PNG téléchargé');
    } catch (e) {
      console.error(e);
      toast('❌ Erreur, réessaie');
    }
  }

  async function sharePoster() {
    toast('Génération en cours...', 5000);
    try {
      const canvas = await renderFullResPoster();
      const blob = await new Promise(r => canvas.toBlob(r, 'image/png', 0.95));
      const file = new File([blob], `FCA_${state.variant}.png`, { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'FC Atlantic Vevey', text: buildCaption() });
        toast('✅ Partagé');
      } else {
        toast('Partage non dispo, télécharge-le');
      }
    } catch (e) {
      console.error(e);
      toast('❌ Erreur de partage');
    }
  }

  async function copyCaption() {
    try {
      await navigator.clipboard.writeText(buildCaption());
      toast('✅ Caption copiée');
    } catch (e) {
      toast('❌ Copie impossible');
    }
  }

  /* ------ INIT -------------------------------------------------------- */
  renderVariantChips();
  renderPlayerGrid('scorer-grid', state.scorerId, id => {
    state.scorerId = id;
    renderPlayerGrid('scorer-grid', id, arguments.callee);
    refresh();
  });
  renderPlayerGrid('hdm-grid', state.hdmId, id => {
    state.hdmId = id;
    renderPlayerGrid('hdm-grid', id, arguments.callee);
    refresh();
  });
  
  // Show share button if Web Share API supports files
  if (navigator.canShare && navigator.canShare({ files: [new File([new Blob()], 'x.png', { type: 'image/png' })] })) {
    document.getElementById('share-btn').style.display = '';
  }

  refresh();

  // Hide install tip after 20s
  setTimeout(() => { document.getElementById('install-tip').style.display = 'none'; }, 20000);

  window.addEventListener('resize', () => updatePreview());
  </script>
</body>
</html>
